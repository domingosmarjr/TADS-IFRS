<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="button" id="b1" value="Muda Cor">

    <script type="text/javascript">
        function mudaCor() {
            document.body.style.backgroundColor = "lavender";
        }

        document.querySelector("#b1").addEventListener("click", mudaCor);
        document.querySelector("#b1").addEventListener()

        /*
            TIPOS DE EVENTOS
            - click         clique normal
            - dblclick      double clique
            - mouseover     mouse por cima
            - mouseout      mouse sair
            - mousedown     pressionar botão
            - mouseup       liberar botão
        */

    </script>
</body>
</html>
