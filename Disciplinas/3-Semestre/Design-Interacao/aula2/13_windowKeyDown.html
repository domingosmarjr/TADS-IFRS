<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        window.addEventListener("keydown", verifica, false);

        function verifica(e) {
            if (e.keyCode == "65") {
                alert("A tecla foi pressionada.");
            }
        }
    </script>

</body>
</html>
