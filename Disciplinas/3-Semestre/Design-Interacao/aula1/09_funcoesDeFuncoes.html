<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function montaFrase() {
            let nome = 'Fulano';
            
            function funcaoInterna() {
                let nomeCompleto = `${nome} de Tal`;
                return nomeCompleto;
            }

            let frase = `Bom dia ${funcaoInterna()}`;
            return frase;
        }

        alert(montaFrase());
    </script>
</body>
