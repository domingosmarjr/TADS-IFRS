<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        // FUNCTION DECLARATION
        function soma(a, b) {
            return a + b;
        }

        // FUNCTION EXPRESION
        // Dá de declarar função numa variável
        let sum = function sum (a, b) {
            return a + b;
        }


    </script>

</head>
<body>
    <script>
        alert(soma(1, 2));
        alert(sum(3,6))
    </script>

</body>
</html>
