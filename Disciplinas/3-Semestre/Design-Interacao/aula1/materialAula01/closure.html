<body>
   <div></div> 
<script>
function montaFrase() {
  let nome=`Fulano`;
  function funcaoInterna() {
    let nomeCompleto=`${nome} de Tal`;
    return nomeCompleto;
  }
  
  let frase=`Bom dia ${funcaoInterna()}.`;
  return frase; 
} 

document.querySelector("div").innerHTML= montaFrase();    
</script>
</body>
